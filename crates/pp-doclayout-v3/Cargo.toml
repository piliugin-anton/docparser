[package]
name = "pp-doclayout-v3"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "PP-DocLayoutV3 layout detection from HuggingFace safetensors (Candle)"

[dependencies]
anyhow = "1"
candle-core = "0.10"
image = "0.25"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
safetensors = "0.7"
thiserror = "2"
tracing = "0.1"

[dev-dependencies]
docparser-test-utils = { path = "../docparser-test-utils" }
