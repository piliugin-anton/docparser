# Tune generated code for the build host CPU (AVX2/AVX-512, etc.).
# Override for portable artifacts: RUSTFLAGS="" cargo build --release
[build]
rustflags = ["-C", "target-cpu=native"]

# Faster links on Linux after installing LLD (`apt install lld`), uncomment:
# [target.x86_64-unknown-linux-gnu]
# rustflags = ["-C", "link-arg=-fuse-ld=lld", "-C", "target-cpu=native"]
#
# [target.aarch64-unknown-linux-gnu]
# rustflags = ["-C", "link-arg=-fuse-ld=lld", "-C", "target-cpu=native"]
